<!DOCTYPE html>
<html><head><title>Scam Overlay Test</title></head>
<body>
  <h1>Normal page content</h1>
  <p>This is a normal page with a scam overlay that appears after 1 second.</p>
  <div id="overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
       background:white;z-index:10000;text-align:center;padding-top:200px;">
    <h2>⚠️ Your Computer Is Infected!</h2>
    <p>Click below to clean your PC immediately.</p>
    <button onclick="window.location='https://spam-scam.example.com/clean'">Scan Now</button>
    <button id="fake-close" onclick="window.location='https://spam-scam.example.com/close'">X</button>
  </div>
  <script>
    setTimeout(function() {
      document.getElementById('overlay').style.display = 'block';
    }, 1000);
  </script>
</body></html>
